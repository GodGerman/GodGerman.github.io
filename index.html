<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol Genealógico</title>
    <link rel="icon" href="img/icono.ico" type="image/x-icon">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Custom Canvas Tree Engine (no external dependency) -->
    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="img/img.png" alt="Logo" class="site-logo">
            <h1>Árbol Genealógico</h1>
        </div>
        <button id="add-member-btn" class="primary-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="22" y1="11" x2="16" y2="11"></line></svg>
            Añadir Miembro
        </button>
    </header>
    
    <main>
        <div id="tree-network"></div>
    </main>

    <!-- Modal Form -->
    <div id="member-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Nuevo Miembro</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <form id="member-form" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="nombre">Nombre(s) <span class="required-star">*</span></label>
                        <input type="text" id="nombre" name="nombre" class="form-control" required>
                        <span class="error-msg" id="error-nombre">Este campo es obligatorio.</span>
                    </div>
                    <div class="form-group">
                        <label for="apellido">Apellido(s)</label>
                        <input type="text" id="apellido" name="apellido" class="form-control">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="sexo">Sexo <span class="required-star">*</span></label>
                        <select id="sexo" name="sexo" class="form-control" required>
                            <option value="">Seleccione...</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                            <option value="O">Otro</option>
                        </select>
                        <span class="error-msg" id="error-sexo">Selecciona una opción.</span>
                    </div>
                    <div class="form-group">
                        <label for="fechaNacimiento">Fecha Nacimiento</label>
                        <input type="date" id="fechaNacimiento" name="fechaNacimiento" class="form-control">
                    </div>
                </div>

                <div class="form-row align-items-center">
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="fallecido" name="fallecido">
                        <label for="fallecido">Fallecido/a</label>
                    </div>

                    <div class="form-group hidden" id="death-date-group">
                        <label for="fechaFallecimiento">Fecha de Fallecimiento</label>
                        <input type="date" id="fechaFallecimiento" name="fechaFallecimiento" class="form-control">
                    </div>
                </div>

                <h3>Relaciones (Opcional)</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="idPadre">Padre</label>
                        <select id="idPadre" name="idPadre" class="form-control">
                            <option value="">Ninguno</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="idMadre">Madre</label>
                        <select id="idMadre" name="idMadre" class="form-control">
                            <option value="">Ninguna</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="idPareja">Pareja / Cónyuge</label>
                    <select id="idPareja" name="idPareja" class="form-control">
                        <option value="">Ninguna</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" id="save-member-btn" class="primary-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Detalle del Miembro</h2>
                <button id="close-info-btn" class="close-btn">&times;</button>
            </div>
            <div id="info-content" class="info-content">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader" class="loader-overlay hidden">
        <div class="loader-container">
            <img src="img/img.png" alt="Cargando..." class="loader-logo">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
